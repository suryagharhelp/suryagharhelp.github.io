<h1>Documents Required for PM Surya Ghar</h1>

<ul>
<li>Aadhaar Card</li>
<li>Latest Electricity Bill</li>
<li>Bank Passbook</li>
<li>Address Proof</li>
<li>Passport Size Photo</li>
<li>Property Ownership Proof (if needed)</li>
</ul>

<h2>Tips</h2>
<p>Ensure names match across Aadhaar, bank account and electricity bill.</p>
